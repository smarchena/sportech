<div class="flex justify-content-center py-4">
  <div class="carousel slide w-75" data-bs-ride="carousel" data-bs-interval="2000" id="carouselExampleAutoplaying">

    <div class="carousel-inner" >
      <div class="carousel-item active" >
        <carousel-slide-1></carousel-slide-1>
      </div>

      <div class="carousel-item" >
        <carousel-slide-2></carousel-slide-2>
      </div>

      <div class="carousel-item" >
        <carousel-slide-3></carousel-slide-3>
      </div>
    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="false"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>

  </div>
</div>
